<div class="popup-overlay fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
  <div
    class="popup bg-white w-full max-w-md sm:max-w-lg rounded-xl p-5 sm:p-6 shadow-xl scale-95 animate-[fadeIn_.15s_ease-out]"
  >
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl sm:text-2xl font-semibold text-black">Add Task</h2>

      <button (click)="closePopup()" class="p-1 hover:bg-gray-100 rounded">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
          <path
            d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z"
          />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="taskForm" (ngSubmit)="addTask()" class="flex flex-col gap-4 w-full">
      <!-- Title -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-600">Title</label>
        <input
          #titleInput
          formControlName="title"
          type="text"
          placeholder="Task title"
          class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-amber-500 outline-none w-full"
        />
      </div>

      <!-- Description -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-600">Description</label>
        <textarea
          formControlName="content"
          rows="3"
          placeholder="Write more details..."
          class="border rounded-lg px-3 py-2 resize-none focus:ring-2 focus:ring-amber-500 outline-none w-full"
        ></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-3 pt-4 border-t mt-2">
        <button
          type="button"
          (click)="closePopup()"
          class="px-4 py-2 border rounded-lg hover:bg-gray-100"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700"
        >
          Add Task
        </button>
      </div>
    </form>
  </div>
</div>
