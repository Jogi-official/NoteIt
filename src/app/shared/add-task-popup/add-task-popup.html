<div
  class="fixed inset-0 bg-black/40 backdrop-blur-[2px] flex items-center justify-center p-4 z-50"
>
  <div
    class="#popupWrapper popup bg-white w-full max-w-md sm:max-w-lg rounded-2xl p-6 shadow-2xl scale-100 animate-[fadeIn_.2s_ease-out]"
  >
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-semibold text-gray-800">Add Task</h2>

      <button (click)="closePopup()" class="p-2 rounded-lg hover:bg-gray-100 transition">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
          <path
            d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z"
          />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form
      [formGroup]="taskForm"
      (ngSubmit)="addTask()"
      class="flex flex-col gap-4 w-full text-black"
    >
      <!-- Title -->
      <div class="flex flex-col gap-1">
        <label for="title" class="text-sm font-medium text-gray-600">Title</label>
        <input
          #titleInput
          formControlName="title"
          type="text"
          placeholder="Task title"
          class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none w-full transition"
        />
      </div>

      <!-- Description -->
      <div class="flex flex-col gap-1">
        <label for="content" class="text-sm font-medium text-gray-600">Description</label>
        <textarea
          formControlName="content"
          rows="3"
          placeholder="Write more details..."
          class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none w-full transition"
        ></textarea>
      </div>

      <div class="flex flex-col gap-1">
        <mat-form-field appearance="outline" class="w-full custom-date">
          <mat-label>Due Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="dueDate" />

          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="flex flex-col gap-1">
        <div class="relative w-full">
          <!-- Trigger -->
          <button
            type="button"
            (click)="isOpen = !isOpen"
            class="w-full flex items-center justify-between px-3 py-2 border border-gray-300 rounded-lg bg-white hover:border-orange-400 focus:ring-2 focus:ring-orange-400 transition"
          >
            <span class="flex items-center gap-2">
              <span
                [ngClass]="{
                  'text-green-500': selectedPriority === 'low',
                  'text-yellow-500': selectedPriority === 'medium',
                  'text-red-500': selectedPriority === 'high',
                }"
                >●</span
              >

              {{ selectedPriority | titlecase }}
            </span>

            <span class="text-gray-500 text-sm">▼</span>
          </button>

          <!-- Dropdown -->
          @if (isOpen) {
            <div
              class="absolute mt-2 w-full bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden z-50"
            >
              <div
                (click)="selectPriority('low')"
                class="flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-100 transition"
              >
                <span class="text-green-500">●</span> Low
              </div>

              <div
                (click)="selectPriority('medium')"
                class="flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-100 transition"
              >
                <span class="text-yellow-500">●</span> Medium
              </div>

              <div
                (click)="selectPriority('high')"
                class="flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-100 transition"
              >
                <span class="text-red-500">●</span> High
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-3 pt-5 border-t mt-4">
        <button
          type="button"
          (click)="closePopup()"
          class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="px-5 py-2 rounded-lg bg-orange-500 text-white hover:bg-orange-600 active:scale-95 transition shadow-sm"
        >
          Add Task
        </button>
      </div>
    </form>
  </div>
</div>
