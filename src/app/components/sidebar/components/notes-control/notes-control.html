<section class="px-3 py-4 space-y-1">
  <!-- Primary Action -->
  <button
    (click)="openAddTaskPopup()"
    class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg bg-orange-500 text-white font-medium shadow-sm hover:bg-orange-600 active:scale-[0.98] transition"
  >
    ➕ <span>Add Task</span>
  </button>

  <!-- Secondary Actions -->
  <button
    class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition"
  >
    🔍 <span>Search Tasks</span>
  </button>

  <button
    class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition"
  >
    📅 <span>Upcoming</span>
  </button>

  <button
    class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition"
  >
    ⚙ <span>Filters & Labels</span>
  </button>
</section>
<!-- Popup -->

@if (isAddTaskOpen) {
  <app-add-task-popup (closeDialog)="closeAddTaskPopup()"> </app-add-task-popup>
}
