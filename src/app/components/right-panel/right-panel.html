<div
  class="bg-gradient-to-br from-orange-50 to-orange-100/60 border border-orange-200/60 rounded-2xl p-5 shadow-sm"
>
  <h3 class="font-semibold text-gray-800 mb-4">Today's Progress</h3>

  <div class="space-y-3 text-sm">
    <div class="flex justify-between text-gray-600">
      <span>Completed</span>
      <span class="font-semibold text-gray-800">{{ completedTasks() }}</span>
    </div>

    <div class="flex justify-between text-gray-600">
      <span>Remaining</span>
      <span class="font-semibold text-gray-800">{{ remainingTasks() }}</span>
    </div>
    <div class="flex justify-between text-gray-600">
      <span>Backlog</span>
      <span class="font-semibold text-gray-800">{{ backlogTasks() }}</span>
    </div>
    <div class="flex justify-between text-gray-600">
      <span>Upcoming</span>
      <span class="font-semibold text-gray-800">{{ upcomingTasks() }}</span>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="mt-4">
    <div class="h-2.5 bg-orange-200/70 rounded-full overflow-hidden">
      <div
        class="h-full bg-orange-500 rounded-full transition-all duration-500"
        [style.width.%]="percentageCompleted"
      ></div>
    </div>
  </div>

  <div class="mt-8 space-y-5">
    <h2 class="text-lg font-semibold text-gray-800">Task Details</h2>

    <!-- Card -->
    <div
      class="bg-white border border-gray-200/70 rounded-2xl p-4 shadow-sm hover:shadow-md transition"
    >
      <p class="text-xs text-gray-500 mb-1">Due Date</p>
      <p class="text-sm font-medium text-gray-800">No due date</p>
    </div>

    <div
      class="bg-white border border-gray-200/70 rounded-2xl p-4 shadow-sm hover:shadow-md transition"
    >
      <p class="text-xs text-gray-500 mb-1">Priority</p>
      <p class="text-sm font-medium text-gray-800">Medium</p>
    </div>

    <div
      class="bg-white border border-gray-200/70 rounded-2xl p-4 shadow-sm hover:shadow-md transition"
    >
      <p class="text-xs text-gray-500 mb-1">Project</p>
      <p class="text-sm font-medium text-gray-800">Project Beta</p>
    </div>
  </div>
</div>
